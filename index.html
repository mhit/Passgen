<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passgen - 日本語読みパスワード生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3347;--text:#e4e4e7;--text2:#9ca3af;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'BIZ UDGothic','Noto Sans JP',sans-serif;font-weight:700;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 4rem;}
.container{max-width:1000px;margin:0 auto;}
h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline;}
.header-row{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;}
.subtitle{color:var(--text2);font-size:.8rem;}

/* Step */
.step{margin-bottom:1.2rem;}
.step-head{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;}
.step-num{background:var(--accent);color:#fff;width:1.6rem;height:1.6rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;}
.step-title{font-size:.95rem;font-weight:700;}
.step-count{font-size:.8rem;color:var(--accent2);margin-left:auto;}

/* Fields */
.field label{display:block;font-size:.75rem;color:var(--text2);margin-bottom:.25rem;font-weight:700;}
.field input,.field select,.field textarea{width:100%;padding:.5rem .7rem;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);font-family:inherit;font-size:.9rem;font-weight:700;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;font-size:.85rem;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;}
.full{grid-column:1/-1;}

/* Buttons */
.btn{padding:.5rem 1rem;border:none;border-radius:5px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-sm{padding:.35rem .7rem;font-size:.8rem;}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border);}.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-danger{background:none;color:var(--red);border:1px solid transparent;}.btn-danger:hover{border-color:var(--red);}
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;}

/* Smart Input */
.smart-input{border:2px dashed var(--border);border-radius:8px;padding:1rem;transition:all .2s;position:relative;}
.smart-input.dragover{border-color:var(--accent);background:rgba(99,102,241,.05);}
.smart-input textarea{width:100%;min-height:100px;border:none;background:transparent;color:var(--text);font-family:Consolas,Monaco,monospace;font-size:.85rem;font-weight:400;line-height:1.6;outline:none;resize:vertical;}
.smart-input .hint{font-size:.7rem;color:var(--text2);margin-top:.5rem;line-height:1.4;}
.file-label{display:inline-flex;align-items:center;gap:.3rem;cursor:pointer;font-size:.8rem;color:var(--accent2);transition:color .15s;}
.file-label:hover{color:var(--accent);}
.file-label input{display:none;}

/* Mapping UI */
.mapping{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:.8rem;display:none;}
.mapping.show{display:block;}
.mapping-title{font-size:.85rem;color:var(--accent2);margin-bottom:.6rem;}
.mapping-row{display:flex;align-items:center;gap:.8rem;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.85rem;}
.mapping-row:last-child{border-bottom:none;}
.mapping-col{color:var(--text2);width:2rem;text-align:center;flex-shrink:0;}
.mapping-sample{flex:0 0 140px;font-family:Consolas,monospace;color:var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400;}
.mapping-arrow{color:var(--text2);flex-shrink:0;}
.mapping-row select{flex:1;padding:.3rem .5rem;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);font-family:inherit;font-size:.8rem;font-weight:700;}
.mapping-preview{margin-top:.6rem;font-size:.8rem;color:var(--text2);line-height:1.5;}
.mapping-actions{margin-top:.8rem;display:flex;gap:.5rem;}

/* Single user input */
.single-input{display:none;margin-top:.6rem;}
.single-input.show{display:block;}
.single-toggle{font-size:.8rem;color:var(--accent2);cursor:pointer;border:none;background:none;font-family:inherit;font-weight:700;padding:0;margin-top:.5rem;}
.single-toggle:hover{color:var(--accent);}

/* Gen bar */
.gen-bar{display:flex;gap:.6rem;align-items:end;flex-wrap:wrap;padding:.8rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.gen-bar .field{min-width:0;}
.gen-bar .field select{font-size:.8rem;padding:.4rem .5rem;}

/* Table */
.pw-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.pw-table th{text-align:left;padding:.5rem .6rem;background:var(--surface2);color:var(--text2);font-size:.75rem;font-weight:700;border-bottom:1px solid var(--border);position:sticky;top:0;}
.pw-table td{padding:.4rem .6rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.pw-table tr:hover{background:rgba(99,102,241,.04);}
.pw-cell{font-family:Consolas,Monaco,monospace;font-size:.95rem;font-weight:700;letter-spacing:.4px;color:var(--green);user-select:all;cursor:pointer;}
.pw-cell:hover{color:#4ade80;}
.reading{font-size:.8rem;color:var(--text2);}
.no{color:var(--text2);text-align:center;width:2rem;}
.chk{text-align:center;width:2rem;} .chk input{accent-color:var(--accent);cursor:pointer;}
.regen-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:.15rem .35rem;border-radius:3px;cursor:pointer;font-size:.7rem;}.regen-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:.2rem .4rem;border-radius:3px;cursor:pointer;font-size:.7rem;transition:all .15s;}.copy-btn:hover{border-color:var(--accent);color:var(--accent);}.copy-btn.copied{border-color:var(--green);color:var(--green);}
.strength{display:inline-block;padding:.1rem .4rem;border-radius:3px;font-size:.65rem;font-weight:700;}
.strength-strong{background:rgba(34,197,94,.12);color:var(--green);}
.strength-medium{background:rgba(234,179,8,.12);color:#eab308;}
.empty{text-align:center;padding:2rem;color:var(--text2);background:var(--surface);border-radius:8px;border:1px dashed var(--border);font-size:.85rem;}
.result-wrap{max-height:55vh;overflow-y:auto;border:1px solid var(--border);border-radius:8px;}

/* Collapsible */
.collapse-head{display:flex;align-items:center;gap:.5rem;cursor:pointer;padding:.6rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:.85rem;color:var(--text2);transition:all .15s;user-select:none;}
.collapse-head:hover{color:var(--text);border-color:var(--accent);}
.collapse-head .arrow{transition:transform .2s;font-size:.7rem;}
.collapse-head.open .arrow{transform:rotate(90deg);}
.collapse-body{display:none;padding:.8rem;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;}
.collapse-body.open{display:block;}

/* Dropdown */
.dropdown{position:relative;display:inline-block;}
.dropdown-menu{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem 0;min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:50;}
.dropdown.open .dropdown-menu{display:block;}
.dropdown-menu button{display:block;width:100%;text-align:left;padding:.45rem .9rem;border:none;background:none;color:var(--text);font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;}
.dropdown-menu button:hover{background:var(--surface2);}
.dropdown-sep{padding:.2rem .9rem;font-size:.65rem;color:var(--text2);border-top:1px solid var(--border);margin-top:.2rem;pointer-events:none;}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.6rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.8rem;transform:translateY(80px);opacity:0;transition:all .25s;z-index:100;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:768px){
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .gen-bar{flex-direction:column;}
  .btn-row{flex-direction:column;}.btn-row .btn{width:100%;}
  .header-row{flex-direction:column;gap:.3rem;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>Passgen</h1>
    <span class="subtitle">日本語読みパスワード生成器</span>
  </div>

  <!-- ===== STEP 1: ユーザーデータ ===== -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">1</div>
      <div class="step-title">ユーザーデータ</div>
      <div class="step-count" id="userCount"></div>
    </div>

    <div class="smart-input" id="smartInput">
      <textarea id="dataInput" placeholder="ここにペースト（CSV / スプレッドシート / テキスト）&#10;&#10;例:&#10;山田 太郎, yamada.taro&#10;佐藤 花子, sato.hanako&#10;&#10;または姓・名・メール等の複数列データもOK&#10;ヘッダー行があれば自動認識します"></textarea>
      <div class="hint">
        <span class="file-label"><label>CSVファイル読込<input type="file" accept=".csv,.tsv,.txt" onchange="handleFile(event)"></label></span>
        &nbsp;|&nbsp; TAB / カンマ区切り自動検出 &nbsp;|&nbsp; ヘッダー行自動認識
      </div>
    </div>

    <!-- カラムマッピングUI -->
    <div class="mapping" id="mappingUI">
      <div class="mapping-title" id="mappingTitle">カラムマッピング</div>
      <div id="mappingRows"></div>
      <div class="mapping-preview" id="mappingPreview"></div>
      <div class="mapping-actions">
        <button class="btn btn-primary btn-sm" onclick="applyMapping()">適用</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelMapping()">キャンセル</button>
      </div>
    </div>

    <!-- 1人分手入力 -->
    <button class="single-toggle" onclick="toggleSingleInput()">▸ 1人分を手入力</button>
    <div class="single-input" id="singleInput">
      <div class="grid-2">
        <div class="field"><label>名前</label><input type="text" id="singleName" placeholder="山田 太郎"></div>
        <div class="field"><label>ログインID</label><input type="text" id="singleUser" placeholder="yamada.taro"></div>
      </div>
      <div style="margin-top:.5rem;">
        <button class="btn btn-ghost btn-sm" onclick="addSingleUser()">追加</button>
      </div>
    </div>
  </div>

  <!-- ===== STEP 2: パスワード生成 ===== -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">2</div>
      <div class="step-title">パスワード生成</div>
    </div>

    <div class="gen-bar">
      <div class="field" style="flex:0 0 100px;"><label>生成数/人</label>
        <select id="count"><option value="1" selected>1個</option><option value="3">3個</option><option value="5">5個</option><option value="10">10個</option></select>
      </div>
      <div class="field" style="flex:0 0 120px;"><label>パスワード長</label>
        <select id="lengthPref"><option value="short">短め</option><option value="medium" selected>標準</option><option value="long">長め</option></select>
      </div>
      <div class="field" style="flex:0 0 150px;"><label>特殊文字</label>
        <select id="symbolSet"><option value="standard" selected>標準 (!@#$%&*)</option><option value="safe">安全 (!@#$)</option><option value="all">全て</option></select>
      </div>
      <label style="font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:.3rem;cursor:pointer;"><input type="checkbox" id="optUppercase" checked style="accent-color:var(--accent);">大文字</label>
      <label style="font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:.3rem;cursor:pointer;"><input type="checkbox" id="optDigits" checked style="accent-color:var(--accent);">数字</label>
      <label style="font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:.3rem;cursor:pointer;"><input type="checkbox" id="optSymbols" checked style="accent-color:var(--accent);">記号</label>
      <button class="btn btn-primary" onclick="generateAll()">生成</button>
      <button class="btn btn-ghost btn-sm" onclick="regenAll()">全再生成</button>
    </div>

    <div style="margin-top:.8rem;">
      <div class="result-wrap">
        <div id="output"><div class="empty">STEP 1 でユーザーデータを入力し「生成」を押してください</div></div>
      </div>
    </div>
  </div>

  <!-- ===== STEP 3: 出力 ===== -->
  <div class="step">
    <div class="step-head">
      <div class="step-num">3</div>
      <div class="step-title">出力</div>
    </div>

    <!-- 通知書設定 -->
    <div style="margin-bottom:.6rem;">
      <div class="collapse-head" onclick="toggleCollapse('noticeSettings')">
        <span class="arrow">▸</span> 通知書・共通設定
      </div>
      <div class="collapse-body" id="noticeSettings">
        <div class="grid-2" style="margin-bottom:.8rem;">
          <div class="field"><label>組織名 / 部署名</label><input type="text" id="orgName" placeholder="株式会社ABC 情報システム部"></div>
          <div class="field"><label>システム名</label><input type="text" id="systemName" placeholder="社内ポータル / Google Workspace"></div>
          <div class="field"><label>ログインURL</label><input type="text" id="loginUrl" placeholder="https://portal.example.com/login"></div>
          <div class="field"><label>発行者</label><input type="text" id="issuerName" placeholder="情報システム部 鈴木"></div>
          <div class="field full"><label>備考</label><textarea id="remarks" style="min-height:50px;" placeholder="初回ログイン後、速やかにパスワードを変更してください。"></textarea></div>
        </div>
      </div>
    </div>

    <!-- クラウド設定 -->
    <div style="margin-bottom:.8rem;">
      <div class="collapse-head" onclick="toggleCollapse('cloudSettings')">
        <span class="arrow">▸</span> クラウドサービス設定 (GWS / M365 / Apple)
      </div>
      <div class="collapse-body" id="cloudSettings">
        <div class="grid-3">
          <div class="field"><label>メールドメイン</label><input type="text" id="gwsDomain" placeholder="example.com"></div>
          <div class="field"><label>組織部門パス</label><input type="text" id="gwsOrgUnit" placeholder="/ または /営業部"></div>
          <div class="field"><label>PW変更を強制</label>
            <select id="gwsChangePassword"><option value="TRUE" selected>必須</option><option value="FALSE">不要</option></select>
          </div>
          <div class="field"><label>M365 利用場所</label><input type="text" id="m365UsageLocation" placeholder="JP"></div>
          <div class="field"><label>ABM ロール</label>
            <select id="abmRole"><option value="Staff" selected>Staff</option><option value="Manager">Manager</option><option value="Administrator">Administrator</option></select>
          </div>
        </div>
      </div>
    </div>

    <!-- 出力ボタン -->
    <div class="btn-row">
      <div class="dropdown" id="ddPrint">
        <button class="btn btn-primary" onclick="toggleDropdown('ddPrint')">印刷 / PDF ▾</button>
        <div class="dropdown-menu">
          <button onclick="printNotice();closeDropdowns();">アカウント通知書 (A4個別)</button>
          <button onclick="printList();closeDropdowns();">パスワード一覧</button>
        </div>
      </div>
      <div class="dropdown" id="ddCSV">
        <button class="btn btn-primary" onclick="toggleDropdown('ddCSV')">CSV出力 ▾</button>
        <div class="dropdown-menu">
          <button onclick="exportCSV();closeDropdowns();">汎用CSV</button>
          <div class="dropdown-sep">Google Workspace</div>
          <button onclick="gwsExportAdd();closeDropdowns();">新規追加</button>
          <button onclick="gwsExportUpdate();closeDropdowns();">更新（PW変更）</button>
          <button onclick="gwsExportDelete();closeDropdowns();">削除</button>
          <div class="dropdown-sep">Microsoft 365 / Entra ID</div>
          <button onclick="m365ExportAdd();closeDropdowns();">新規追加</button>
          <button onclick="m365ExportUpdate();closeDropdowns();">更新（PW変更）</button>
          <div class="dropdown-sep">Apple Business Manager</div>
          <button onclick="abmExportAdd();closeDropdowns();">ABM参照用CSV</button>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="selectAllEntries()">全選択</button>
      <button class="btn btn-danger btn-sm" onclick="clearAllEntries()">クリア</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="dict.js"></script>
<script>
// ===== PW生成エンジン =====
const SYM_STD='!@#$%&*',SYM_SAFE='!@#$',SYM_ALL='!@#$%^&*_+-=';
// CSPRNG
function rand(n){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%n;}
function pick(a){return a[rand(a.length)];}
function cap(s){return s?s[0].toUpperCase()+s.slice(1):s;}

// ===== 音節テーブル (116音節) =====
// [romaji, katakana] - 五十音+濁音+半濁音+拗音+外来音
const SYL=[
  // 母音 (5)
  ['a','ア'],['i','イ'],['u','ウ'],['e','エ'],['o','オ'],
  // か行 (5)
  ['ka','カ'],['ki','キ'],['ku','ク'],['ke','ケ'],['ko','コ'],
  // さ行 (5)
  ['sa','サ'],['shi','シ'],['su','ス'],['se','セ'],['so','ソ'],
  // た行 (5)
  ['ta','タ'],['chi','チ'],['tsu','ツ'],['te','テ'],['to','ト'],
  // な行 (5)
  ['na','ナ'],['ni','ニ'],['nu','ヌ'],['ne','ネ'],['no','ノ'],
  // は行 (5)
  ['ha','ハ'],['hi','ヒ'],['fu','フ'],['he','ヘ'],['ho','ホ'],
  // ま行 (5)
  ['ma','マ'],['mi','ミ'],['mu','ム'],['me','メ'],['mo','モ'],
  // や行 (3)
  ['ya','ヤ'],['yu','ユ'],['yo','ヨ'],
  // ら行 (5)
  ['ra','ラ'],['ri','リ'],['ru','ル'],['re','レ'],['ro','ロ'],
  // わ行+ん (2)
  ['wa','ワ'],['n','ン'],
  // 濁音 (20)
  ['ga','ガ'],['gi','ギ'],['gu','グ'],['ge','ゲ'],['go','ゴ'],
  ['za','ザ'],['ji','ジ'],['zu','ズ'],['ze','ゼ'],['zo','ゾ'],
  ['da','ダ'],['de','デ'],['do','ド'],
  ['ba','バ'],['bi','ビ'],['bu','ブ'],['be','ベ'],['bo','ボ'],
  // 半濁音 (5)
  ['pa','パ'],['pi','ピ'],['pu','プ'],['pe','ペ'],['po','ポ'],
  // 拗音 (21)
  ['kya','キャ'],['kyu','キュ'],['kyo','キョ'],
  ['sha','シャ'],['shu','シュ'],['sho','ショ'],
  ['cha','チャ'],['chu','チュ'],['cho','チョ'],
  ['nya','ニャ'],['nyu','ニュ'],['nyo','ニョ'],
  ['hya','ヒャ'],['hyu','ヒュ'],['hyo','ヒョ'],
  ['rya','リャ'],['ryu','リュ'],['ryo','リョ'],
  ['gya','ギャ'],['gyu','ギュ'],['gyo','ギョ'],
  // 外来音 (12)
  ['va','ヴァ'],['vi','ヴィ'],['ve','ヴェ'],['vo','ヴォ'],
  ['fa','ファ'],['fi','フィ'],['fe','フェ'],['fo','フォ'],
  ['ja','ジャ'],['ju','ジュ'],['jo','ジョ'],
  ['di','ディ'],
];
// ンで終わらない音節 (語頭・語中用)
const SYL_START=SYL.filter(s=>s[0]!=='n'||s[0].length>1);

// 音節合成で発音可能な「語」を動的生成
function synthWord(targetLen){
  // targetLen: romaji目標文字数 (2-8)
  let romaji='',kana='',len=0;
  const maxSyl=targetLen<=4?2:targetLen<=6?3:4;
  for(let i=0;i<maxSyl&&len<targetLen;i++){
    // 最後の音節はンもOK、それ以外はンで終わらない
    const pool=(i<maxSyl-1)?SYL_START:SYL;
    const s=pick(pool);
    romaji+=s[0];kana+=s[1];len+=s[0].length;
  }
  return[romaji,kana];
}

// 辞書キャッシュ
const _wordCache={};
function pickDictWord(h){
  if(!_wordCache[h]){
    _wordCache[h]=h==='short'?WORD_LIST.filter(w=>w[0].length<=4):h==='long'?WORD_LIST.filter(w=>w[0].length>=3):[...WORD_LIST];
  }
  return pick(_wordCache[h]);
}

// 語を取得: ハイブリッド (50%辞書 / 50%音節合成)
function pickWord(hint){
  const targetLen=hint==='short'?rand(3)+2:hint==='long'?rand(3)+5:rand(3)+3;
  if(rand(2)===0){
    // 辞書モード
    return pickDictWord(hint);
  }else{
    // 音節合成モード
    return synthWord(targetLen);
  }
}

const PAT=[(s,d,a,b)=>s+a+b+d,(s,d,a,b)=>s+d+a+b,(s,d,a,b)=>a+d+s+b,(s,d,a,b)=>a+b+s+d,(s,d,a,b)=>d+a+s+b,(s,d,a,b)=>d+s+a+b,(s,d,a,b)=>a+s+d+b,(s,d,a,b)=>a+d+b+s,(s,d,a,b)=>s+a+d+b,(s,d,a,b)=>d+a+b+s];
function genPw(lp,ss){
  const syms=ss==='safe'?SYM_SAFE:ss==='all'?SYM_ALL:SYM_STD;
  const[r1,k1]=pickWord(lp==='short'?'short':lp==='long'?'long':'medium');
  const[r2,k2]=pickWord(lp==='short'?'short':lp==='long'?'long':'medium');
  const w1=cap(r1),w2=cap(r2);
  const digitRange=lp==='long'?100:10;
  const d=String(rand(digitRange)),s=syms[rand(syms.length)];
  const pw=pick(PAT)(s,d,w1,w2),len=pw.length;
  // エントロピー: 辞書(766)+音節合成(116^2~116^4) の混合
  // 保守的に辞書サイズ+音節2乗の平均で計算
  const wordSpace=WORD_LIST.length+SYL.length*SYL.length;
  const entropy=Math.floor(Math.log2(wordSpace*wordSpace*PAT.length*syms.length*digitRange));
  return{password:pw,readingRomaji:r1+'-'+r2,readingKana:k1+'-'+k2,entropy,strength:entropy>=40?'strong':'medium',length:len};
}

// ===== データモデル =====
// entries: [{name,user,pw:{password,readingKana,...},selected}]
let entries=[];

// ===== Smart Paste =====
const HEADER_HINTS={
  last:/^(姓|last.?name|family|苗字|sei)$/i,
  first:/^(名|first.?name|given|mei)$/i,
  fullname:/^(氏名|名前|name|display|フルネーム|full)$/i,
  userid:/^(id|login|user|account|ユーザー|ログイン|アカウント|username|user.?id|login.?id)$/i,
  email:/^(email|mail|メール|e-mail|メールアドレス|email.?address)$/i,
};
const DATA_HINTS={
  email:v=>/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v),
  userid:v=>/^[a-z0-9._-]+$/i.test(v)&&v.includes('.')&&!v.includes('@'),
  jpname:v=>/^[\u3000-\u9FFF\uF900-\uFAFF]+$/.test(v)&&v.length<=4,
};

let rawParsed=null; // {rows:[[]], sep, hasHeader, colCount}

function detectSep(text){
  const first3=text.split('\n').slice(0,3).join('\n');
  const tabs=first3.split('\t').length-1;
  const commas=first3.split(',').length-1;
  return tabs>commas?'\t':',';
}

function parseRaw(text){
  text=text.trim();if(!text)return null;
  const sep=detectSep(text);
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const rows=lines.map(l=>l.split(sep).map(c=>c.trim().replace(/^["']|["']$/g,'')));
  const colCount=Math.max(...rows.map(r=>r.length));
  // Pad short rows
  rows.forEach(r=>{while(r.length<colCount)r.push('');});
  // Detect header
  let hasHeader=false;
  if(rows.length>=2){
    const first=rows[0].map(c=>c.toLowerCase());
    hasHeader=first.some(c=>{
      for(const k in HEADER_HINTS)if(HEADER_HINTS[k].test(c))return true;
      return false;
    });
  }
  return{rows,sep,hasHeader,colCount};
}

function autoMapColumns(parsed){
  const{rows,hasHeader,colCount}=parsed;
  const mapping=new Array(colCount).fill('skip');
  if(hasHeader){
    const hdr=rows[0];
    hdr.forEach((h,i)=>{
      const hl=h.toLowerCase().trim();
      for(const[k,re] of Object.entries(HEADER_HINTS)){
        if(re.test(hl)){mapping[i]=k;break;}
      }
    });
  }
  // If no header or unmapped, guess from data
  const dataRows=hasHeader?rows.slice(1):rows;
  if(dataRows.length>0){
    for(let i=0;i<colCount;i++){
      if(mapping[i]!=='skip')continue;
      const samples=dataRows.slice(0,5).map(r=>r[i]).filter(Boolean);
      if(samples.every(s=>DATA_HINTS.email(s))){mapping[i]='email';}
      else if(samples.every(s=>DATA_HINTS.userid(s))){mapping[i]='userid';}
    }
  }
  // Simple heuristic for 1-3 columns with no header
  if(!hasHeader&&!mapping.some(m=>m!=='skip')){
    if(colCount===1)mapping[0]='fullname';
    else if(colCount===2){mapping[0]='fullname';mapping[1]='userid';}
    else if(colCount===3){mapping[0]='last';mapping[1]='first';mapping[2]='userid';}
  }
  return mapping;
}

function handlePaste(){
  // Slight delay to get pasted content
  setTimeout(()=>{
    const text=document.getElementById('dataInput').value;
    processPaste(text);
  },50);
}

function handleFile(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{document.getElementById('dataInput').value=e.target.result;processPaste(e.target.result);showToast(file.name+' 読込完了');};
  reader.readAsText(file,'UTF-8');ev.target.value='';
}

function processPaste(text){
  rawParsed=parseRaw(text);
  if(!rawParsed||rawParsed.rows.length===0)return;
  const mapping=autoMapColumns(rawParsed);
  const dataRows=rawParsed.hasHeader?rawParsed.rows.slice(1):rawParsed.rows;

  // If mapping is clean (has fullname or last+first, and optionally userid/email), auto-apply
  const hasName=mapping.includes('fullname')||(mapping.includes('last')&&mapping.includes('first'));
  const simple=rawParsed.colCount<=3&&hasName;

  if(simple){
    applyMappingWith(mapping);
  }else{
    showMappingUI(mapping);
  }
}

function showMappingUI(mapping){
  const ui=document.getElementById('mappingUI');
  const dataRows=rawParsed.hasHeader?rawParsed.rows.slice(1):rawParsed.rows;
  const sample=dataRows[0]||[];

  let h='';
  for(let i=0;i<rawParsed.colCount;i++){
    const hdr=rawParsed.hasHeader?rawParsed.rows[0][i]:'';
    const samp=sample[i]||'';
    h+=`<div class="mapping-row">
      <div class="mapping-col">${i+1}</div>
      <div class="mapping-sample" title="${esc(hdr?hdr+': ':'')}${esc(samp)}">${esc(hdr?hdr+': ':'')}<span style="color:var(--green)">${esc(samp)}</span></div>
      <div class="mapping-arrow">→</div>
      <select id="map_${i}">
        <option value="skip"${mapping[i]==='skip'?' selected':''}>スキップ</option>
        <option value="last"${mapping[i]==='last'?' selected':''}>姓</option>
        <option value="first"${mapping[i]==='first'?' selected':''}>名</option>
        <option value="fullname"${mapping[i]==='fullname'?' selected':''}>氏名（フルネーム）</option>
        <option value="userid"${mapping[i]==='userid'?' selected':''}>ログインID</option>
        <option value="email"${mapping[i]==='email'?' selected':''}>メールアドレス</option>
      </select>
    </div>`;
  }
  document.getElementById('mappingRows').innerHTML=h;
  document.getElementById('mappingTitle').textContent=`カラムマッピング — ${rawParsed.colCount}列 × ${dataRows.length}行を検出`;
  updateMappingPreview();
  // Listen for select changes
  for(let i=0;i<rawParsed.colCount;i++){
    document.getElementById('map_'+i).addEventListener('change',updateMappingPreview);
  }
  ui.classList.add('show');
}

function updateMappingPreview(){
  if(!rawParsed)return;
  const mapping=getCurrentMapping();
  const dataRows=rawParsed.hasHeader?rawParsed.rows.slice(1):rawParsed.rows;
  const preview=dataRows.slice(0,3).map(r=>{
    const u=buildUserFromRow(r,mapping);
    return `${u.name} → ${u.user||'(IDなし)'}`;
  }).join('<br>');
  document.getElementById('mappingPreview').innerHTML='<b>プレビュー:</b><br>'+preview;
}

function getCurrentMapping(){
  const m=[];
  for(let i=0;i<rawParsed.colCount;i++){
    const el=document.getElementById('map_'+i);
    m.push(el?el.value:'skip');
  }
  return m;
}

function buildUserFromRow(row,mapping){
  let last='',first='',fullname='',userid='',email='';
  mapping.forEach((m,i)=>{
    const v=(row[i]||'').trim();
    if(m==='last')last=v;
    else if(m==='first')first=v;
    else if(m==='fullname')fullname=v;
    else if(m==='userid')userid=v;
    else if(m==='email')email=v;
  });
  const name=fullname||(last&&first?last+' '+first:last||first);
  if(!userid&&email)userid=email.split('@')[0];
  return{name,user:userid};
}

function applyMapping(){
  if(!rawParsed)return;
  applyMappingWith(getCurrentMapping());
  document.getElementById('mappingUI').classList.remove('show');
}
function cancelMapping(){
  document.getElementById('mappingUI').classList.remove('show');
  rawParsed=null;
}

function applyMappingWith(mapping){
  const dataRows=rawParsed.hasHeader?rawParsed.rows.slice(1):rawParsed.rows;
  const users=dataRows.map(r=>buildUserFromRow(r,mapping)).filter(u=>u.name||u.user);
  entries=users.map(u=>({name:u.name,user:u.user,pw:null,selected:true}));
  updateUserCount();
  renderTable();
  showToast(entries.length+'人のユーザーデータを読み込みました');
}

  entries.forEach((e,i)=>{

function copyPw(i){

function buildNoticePages(entries,f){

  let pages='';entries.forEach(e=>{pages+=`<div class="page"><div class="header"><div class="doc-title">アカウント通知書</div>${f.org?'<div style="font-size:13px;color:#555;margin-top:6px;">'+esc(f.org)+'</div>':''}<div class="date">${today}</div></div><div class="to">${e.name?'<span class="name">'+esc(e.name)+'</span> <span class="suffix">殿</span>':''}</div><div class="section-title">アカウント情報</div><div class="account-box">${f.system?'<div class="account-row"><div class="account-label">システム名</div><div class="account-value">'+esc(f.system)+'</div></div>':''}${e.user?'<div class="account-row"><div class="account-label">ログインID</div><div class="account-value">'+esc(e.user)+'</div></div>':''}${f.url?'<div class="account-row"><div class="account-label">ログインURL</div><div class="account-value" style="font-size:12px;">'+esc(f.url)+'</div></div>':''}<div class="account-row"><div class="account-label">初期パスワード</div><div class="account-value pw">${esc(e.pw.password)}</div></div><div class="account-row"><div class="account-label">パスワード読み方</div><div><div class="account-value reading">${esc(e.pw.readingKana)} / ${esc(e.pw.readingRomaji)}</div></div></div></div>${f.remarks?'<div class="remarks-box"><div class="rtitle">備考</div>'+esc(f.remarks).replace(/\n/g,'<br>')+'</div>':''}<div class="section-title">注意事項</div><ul class="default-notes"><li>初回ログイン後、速やかにパスワードを変更してください。</li><li>パスワードは他者に開示しないでください。</li><li>本通知書は受領確認後、シュレッダー等で安全に破棄してください。</li><li>不明点は${f.issuer?esc(f.issuer):'管理者'}までお問い合わせください。</li></ul><div class="sign-area"><div class="sign-block"><div class="sign-label">受領者署名</div><div class="sign-line"></div><div style="font-size:10px;color:#aaa;margin-top:3px;">日付:　　　年　　月　　日</div></div><div class="issuer-block">${f.issuer?'<div>発行者: '+esc(f.issuer)+'</div>':''}${f.org?'<div style="font-size:12px;color:#888;">'+esc(f.org)+'</div>':''}</div></div><div class="footer-line">CONFIDENTIAL - 本書は機密文書です</div></div>`;});
  return'<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">'+FONT_LINK+'<title>アカウント通知書</title><style>'+NOTICE_CSS+'</style></head><body>'+pages+'</body></html>';
}
const LIST_CSS=`@page{size:A4;margin:15mm;}body{font-family:'BIZ UDGothic','Noto Sans JP',sans-serif;color:#222;font-size:12px;font-weight:700;}h1{font-size:18px;margin:0 0 4px;}.meta{color:#888;font-size:11px;margin-bottom:10px;}.info-box{background:#f5f5fa;border:1px solid #ddd;border-radius:4px;padding:8px 12px;margin-bottom:10px;}.info-tbl{border-collapse:collapse;}.info-tbl th{text-align:left;padding:2px 14px 2px 0;color:#555;font-weight:700;font-size:12px;}.info-tbl td{padding:2px 0;font-size:12px;}table.main{width:100%;border-collapse:collapse;margin-bottom:10px;}table.main th{background:#3c3c50;color:#fff;text-align:left;padding:6px 8px;font-size:11px;}table.main td{padding:5px 8px;border-bottom:1px solid #e0e0e0;font-size:12px;}table.main tr.alt{background:#f8f8fc;}.no{color:#999;text-align:center;width:28px;}.pw{font-family:Consolas,Monaco,monospace;font-weight:700;color:#147838;font-size:13px;letter-spacing:.3px;}.footer{border-top:1px solid #ddd;padding-top:5px;color:#aaa;font-size:9px;font-weight:400;}`;
function buildListPage(sel,f){
  const now=new Date().toLocaleString('ja-JP');
  let info='';if(f.org||f.system){info='<div class="info-box"><table class="info-tbl">';if(f.org)info+='<tr><th>組織名</th><td>'+esc(f.org)+'</td></tr>';if(f.system)info+='<tr><th>システム</th><td>'+esc(f.system)+'</td></tr>';info+='</table></div>';}
  let rows='';sel.forEach((e,i)=>{rows+='<tr'+(i%2?' class="alt"':'')+'><td class="no">'+(i+1)+'</td><td>'+esc(e.name)+'</td><td>'+esc(e.user)+'</td><td class="pw">'+esc(e.pw.password)+'</td><td>'+esc(e.pw.readingKana)+'</td><td>'+esc(e.pw.readingRomaji)+'</td></tr>';});
  return'<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">'+FONT_LINK+'<title>パスワード一覧</title><style>'+LIST_CSS+'</style></head><body><h1>パスワード一覧</h1><div class="meta">生成日時: '+now+' / '+sel.length+'件</div>'+info+'<table class="main"><thead><tr><th class="no">No</th><th>名前</th><th>ID</th><th>パスワード</th><th>読み方（カタカナ）</th><th>読み方（ローマ字）</th></tr></thead><tbody>'+rows+'</tbody></table><div class="footer">CONFIDENTIAL - 取扱注意 | Generated by Passgen</div></body></html>';
}

function openPrint(html){const w=window.open('','_blank','width=900,height=700');if(!w){showToast('ポップアップを許可してください');return;}w.document.write(html);w.document.close();w.focus();setTimeout(()=>{w.print();},1500);}
function downloadCSV(csv,fn){const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();URL.revokeObjectURL(a.href);showToast('CSV出力完了');}

// ===== Drag & Drop =====
const si=document.getElementById('smartInput');
si.addEventListener('dragover',e=>{e.preventDefault();si.classList.add('dragover');});
si.addEventListener('dragleave',()=>si.classList.remove('dragover'));
si.addEventListener('drop',e=>{
  e.preventDefault();si.classList.remove('dragover');
  const file=e.dataTransfer.files[0];
  if(file){const r=new FileReader();r.onload=ev=>{document.getElementById('dataInput').value=ev.target.result;processPaste(ev.target.result);showToast(file.name+' 読込完了');};r.readAsText(file,'UTF-8');}
});
document.getElementById('dataInput').addEventListener('paste',handlePaste);

loadLS();
